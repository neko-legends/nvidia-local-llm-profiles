<line x1="862.0" y1="182" x2="862.0" y2="727" stroke="#2f3742" stroke-width="1"/>
<text x="862.0" y="755.0" class="axis" text-anchor="middle">50</text>
<line x1="1078.0" y1="182" x2="1078.0" y2="727" stroke="#2f3742" stroke-width="1"/>
