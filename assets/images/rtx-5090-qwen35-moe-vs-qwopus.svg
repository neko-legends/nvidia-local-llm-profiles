<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820">
<style>
text{font-family:Segoe UI,Arial,sans-serif;letter-spacing:0}
.title{fill:#edf3f7;font-size:42px;font-weight:750}
.subtitle{fill:#b5bec8;font-size:20px}
.label{fill:#e8eef4;font-size:21px;font-weight:650}
.small{fill:#9aa5b1;font-size:16px}
.value{fill:#edf3f7;font-size:21px;font-weight:750}
.axis{fill:#9aa5b1;font-size:15px}
</style>
<rect width="1600" height="820" fill="#111418"/>
<rect x="404" y="168" width="1136" height="528" rx="10" fill="#181e25"/>
<text x="72.0" y="82.0" class="title">RTX 5090: Qwen 35B MoE NVFP4 vs Qwopus Q5</text>
<text x="72.0" y="122.0" class="subtitle">Average completion tokens per second. One measured MoE run per requested context; Qwopus uses existing repo CSVs.</text>
<line x1="430.0" y1="182" x2="430.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="430.0" y="750.0" class="axis" text-anchor="middle">0</text>
<line x1="646.0" y1="182" x2="646.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="646.0" y="750.0" class="axis" text-anchor="middle">25</text>
<line x1="862.0" y1="182" x2="862.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="862.0" y="750.0" class="axis" text-anchor="middle">50</text>
<line x1="1078.0" y1="182" x2="1078.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="1078.0" y="750.0" class="axis" text-anchor="middle">75</text>
<line x1="1294.0" y1="182" x2="1294.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="1294.0" y="750.0" class="axis" text-anchor="middle">100</text>
<line x1="1510.0" y1="182" x2="1510.0" y2="722" stroke="#2f3742" stroke-width="1"/>
<text x="1510.0" y="750.0" class="axis" text-anchor="middle">125</text>
<text x="72.0" y="176.0" class="label">Short context</text>
<text x="402.0" y="227.0" class="small" text-anchor="end">Qwopus Q5 (8k)</text>
<rect x="430" y="196" width="943.1" height="34" rx="5" fill="#46d3c7" opacity="0.95"/>
<rect x="430" y="196" width="943.1" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="1385.1" y="222.0" class="value">109.2</text>
<text x="1443.1" y="222.0" class="small">tok/s</text>
<text x="402.0" y="295.0" class="small" text-anchor="end">Qwen 35B A3B NVFP4 (10k)</text>
<rect x="430" y="264" width="661.6" height="34" rx="5" fill="#f2b846" opacity="0.95"/>
<rect x="430" y="264" width="661.6" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="1103.6" y="290.0" class="value">76.6</text>
<text x="1161.6" y="290.0" class="small">tok/s</text>
<text x="72.0" y="374.0" class="label">Long context</text>
<text x="402.0" y="425.0" class="small" text-anchor="end">Qwopus Q5 (200k)</text>
<rect x="430" y="394" width="437.1" height="34" rx="5" fill="#46d3c7" opacity="0.95"/>
<rect x="430" y="394" width="437.1" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="879.1" y="420.0" class="value">50.6</text>
<text x="937.1" y="420.0" class="small">tok/s</text>
<text x="402.0" y="493.0" class="small" text-anchor="end">Qwen 35B A3B NVFP4 (200k)</text>
<rect x="430" y="462" width="291.5" height="34" rx="5" fill="#f2b846" opacity="0.95"/>
<rect x="430" y="462" width="291.5" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="733.5" y="488.0" class="value">33.7</text>
<text x="791.5" y="488.0" class="small">tok/s</text>
<text x="72.0" y="786.0" class="small">Source: results/rtx-5090 CSVs. Short context compares MoE 10k against nearest Qwopus result.</text>
<text x="1528.0" y="786.0" class="small" text-anchor="end">neko-legends/nvidia-local-llm-profiles</text>
</svg>
