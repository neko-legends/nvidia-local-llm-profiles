<rect x="430" y="196" width="943.1" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="1385.1" y="222.0" class="value">109.2</text>
<text x="1443.1" y="222.0" class="small">tok/s</text>
<text x="402.0" y="295.0" class="small" text-anchor="end">Qwen 35B GGUF Q4 (10k)</text>
