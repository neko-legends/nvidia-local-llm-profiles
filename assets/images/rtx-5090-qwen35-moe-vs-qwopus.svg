<rect x="430" y="332" width="661.6" height="34" rx="5" fill="none" stroke="#d9fff8" stroke-opacity="0.55"/>
<text x="1103.6" y="358.0" class="value">76.6</text>
<text x="1161.6" y="358.0" class="small">tok/s</text>
