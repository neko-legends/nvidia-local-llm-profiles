<rect width="1600" height="825" fill="#111418"/>
<rect x="404" y="168" width="1136" height="533" rx="10" fill="#181e25"/>
<text x="72.0" y="82.0" class="title">RTX 5090: Qwen 35B local variants vs Qwopus Q5</text>
<text x="72.0" y="122.0" class="subtitle">Average completion tokens per second. Qwen 35B variants use one measured run per requested context.</text>
<line x1="430.0" y1="182" x2="430.0" y2="727" stroke="#2f3742" stroke-width="1"/>
<text x="430.0" y="755.0" class="axis" text-anchor="middle">0</text>
