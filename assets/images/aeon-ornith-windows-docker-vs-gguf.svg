<line x1="777.5" y1="202" x2="777.5" y2="760" stroke="#303842" stroke-width="1"/>
<text x="777.5" y="792.0" class="axis" text-anchor="middle">40</text>
<line x1="906.2" y1="202" x2="906.2" y2="760" stroke="#303842" stroke-width="1"/>
<text x="906.2" y="792.0" class="axis" text-anchor="middle">60</text>
<line x1="1035.0" y1="202" x2="1035.0" y2="760" stroke="#303842" stroke-width="1"/>
<text x="1035.0" y="792.0" class="axis" text-anchor="middle">80</text>
<line x1="1163.8" y1="202" x2="1163.8" y2="760" stroke="#303842" stroke-width="1"/>
<text x="1163.8" y="792.0" class="axis" text-anchor="middle">100</text>
<line x1="1292.5" y1="202" x2="1292.5" y2="760" stroke="#303842" stroke-width="1"/>
<text x="1292.5" y="792.0" class="axis" text-anchor="middle">120</text>
<line x1="1421.2" y1="202" x2="1421.2" y2="760" stroke="#303842" stroke-width="1"/>
<text x="1421.2" y="792.0" class="axis" text-anchor="middle">140</text>
<line x1="1550.0" y1="202" x2="1550.0" y2="760" stroke="#303842" stroke-width="1"/>
<text x="1550.0" y="792.0" class="axis" text-anchor="middle">160</text>
<text x="72.0" y="206.0" class="group">10K prompt</text>
<text x="72.0" y="232.0" class="detail">8,905 prompt tokens</text>
<text x="492.0" y="252.0" class="runtime" text-anchor="end">Docker / vLLM</text>
<rect x="520" y="220" width="299.8" height="38" rx="5" fill="#f2a23a" opacity="0.97"/>
<rect x="520" y="220" width="299.8" height="38" rx="5" fill="none" stroke="#ffd99c" stroke-opacity="0.72"/>
<text x="833.8" y="246.0" class="value">46.6 wall proxy tok/s</text>
<text x="833.8" y="272.0" class="small">22.0s wall; decode split n/a</text>
<text x="492.0" y="326.0" class="runtime" text-anchor="end">Native GGUF / llama.cpp</text>
<rect x="520" y="294" width="856.2" height="38" rx="5" fill="#42d0c4" opacity="0.97"/>
<rect x="520" y="294" width="856.2" height="38" rx="5" fill="none" stroke="#bdf9f4" stroke-opacity="0.72"/>
<text x="1390.2" y="320.0" class="value">133.0 decode tok/s</text>
<text x="1390.2" y="346.0" class="small">9.7s wall; 106.0 wall tok/s; prefill 1.9s</text>
<text x="492.0" y="400.0" class="runtime" text-anchor="end">Native AEON+MTP</text>
<rect x="520" y="368" width="846.5" height="38" rx="5" fill="#7bd66f" opacity="0.97"/>
<rect x="520" y="368" width="846.5" height="38" rx="5" fill="none" stroke="#d4ffcb" stroke-opacity="0.72"/>
<text x="1380.5" y="394.0" class="value">131.5 decode tok/s</text>
<text x="1380.5" y="420.0" class="small">10.1s wall; 101.5 wall tok/s; prefill 2.2s</text>
<text x="72.0" y="498.0" class="group">200K prompt</text>
<text x="72.0" y="524.0" class="detail">174,588 prompt tokens</text>
<text x="492.0" y="544.0" class="runtime" text-anchor="end">Docker / vLLM</text>
<rect x="520" y="512" width="202.7" height="38" rx="5" fill="#f2a23a" opacity="0.97"/>
<rect x="520" y="512" width="202.7" height="38" rx="5" fill="none" stroke="#ffd99c" stroke-opacity="0.72"/>
<text x="736.7" y="538.0" class="value">31.5 wall proxy tok/s</text>
<text x="736.7" y="564.0" class="small">32.5s wall; decode split n/a</text>
<text x="492.0" y="618.0" class="runtime" text-anchor="end">Native GGUF / llama.cpp</text>
<rect x="520" y="586" width="528.5" height="38" rx="5" fill="#42d0c4" opacity="0.97"/>
<rect x="520" y="586" width="528.5" height="38" rx="5" fill="none" stroke="#bdf9f4" stroke-opacity="0.72"/>
<text x="1062.5" y="612.0" class="value">82.1 decode tok/s</text>
<text x="1062.5" y="638.0" class="small">54.1s wall; 18.9 wall tok/s; prefill 41.0s</text>
<text x="492.0" y="692.0" class="runtime" text-anchor="end">Native AEON+MTP</text>
<rect x="520" y="660" width="553.6" height="38" rx="5" fill="#7bd66f" opacity="0.97"/>
<rect x="520" y="660" width="553.6" height="38" rx="5" fill="none" stroke="#d4ffcb" stroke-opacity="0.72"/>
<text x="1087.6" y="686.0" class="value">86.0 decode tok/s</text>
<text x="1087.6" y="712.0" class="small">64.5s wall; 15.9 wall tok/s; prefill 52.1s</text>
<text x="72.0" y="828.0" class="note">Do not compare Docker bars as decode speed: vLLM only gave us full request wall timing for this run.</text>
<text x="72.0" y="862.0" class="note">AEON-trunk MTP changed native decode by -1.1% at 10K and +4.8% at 200K; 200K wall was 15.9 tok/s after long prefill.</text>
<text x="72.0" y="896.0" class="note">10K tuning with draft-mtp n_max=2 reached 133.7 decode tok/s; chart bars use one temp=0.6 n_max=3+ngram profile.</text>
<text x="72.0" y="930.0" class="note">Docker first 10K request was 13.7 tok/s because Triton JIT compilation landed in the timed request.</text>
<text x="72.0" y="998.0" class="small">Source CSVs: results/rtx-5090, prompt hashes match for the 10K and 200K fixtures.</text>
<text x="1608.0" y="998.0" class="small" text-anchor="end">neko-legends/nvidia-local-llm-profiles</text>
</svg>
