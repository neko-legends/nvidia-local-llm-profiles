<rect width="2000" height="900" fill="#101318"/>
<rect x="822" y="207" width="1106" height="609" rx="10" fill="#171d24"/>
<text x="70.0" y="76.0" class="title">Qwen3.6 27B NVFP4 on RTX 5090 Windows 11</text>
<text x="70.0" y="118.0" class="subtitle">Native Windows GGUF llama.cpp vs Windows 11 host + Docker Desktop vLLM, ctx=200k, no-thinking, 1024 generated tokens.</text>
<text x="70.0" y="152.0" class="note">Bars show decode/generation tok/s. Docker vLLM rows use engine log throughput; row details include full-request wall-rate and VRAM.</text>
<text x="70.0" y="178.0" class="note">vLLM is recommended for NVIDIA NVFP4 safetensors, but this Windows 11 Docker path is not the fast native Linux vLLM path.</text>
